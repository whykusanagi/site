name = "whykusanagi-worker"
main = "src/index.js"
# Bumped from 2024-12-01 for the Browser Rendering binding's quickAction API,
# which is only available on recent runtimes. Compat-date bumps opt into new
# defaults; the existing /api/chat + /api/countdown handlers are plain
# fetch/JSON and unaffected (re-verified after deploy).
compatibility_date = "2025-09-01"

# API-only: the Worker is scoped to /api/*. The apex HTML/assets are served
# directly by the whykusanagi Pages project (custom domain); everything outside
# /api/* falls through to Pages. Security headers come from the `_headers` file.
routes = [
  { pattern = "whykusanagi.xyz/api/*", zone_name = "whykusanagi.xyz" }
]

vars = { ENVIRONMENT = "production" }

# ── Tables below. Every top-level key MUST sit above this line: a [table]
#    header claims all following keys, so a stray top-level key here would be
#    silently absorbed into the table (which is exactly how routes/vars got
#    swallowed once). ──

# Browser Rendering binding — powers /api/thumbnail. Granted at deploy time, so
# no API token to mint, store, or rotate.
[browser]
binding = "BROWSER"

# Per-IP rate limiting for /api/chat (native Workers rate-limit binding).
# namespace_id is an arbitrary unique id for this limiter. 20 requests / 60s per IP.
[[unsafe.bindings]]
name = "CHAT_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

# Worker secrets (CELESTE_AGENT_KEY, CELESTE_AGENT_ID, CELESTE_AGENT_BASE_URL,
# CELESTE_SYSTEM_PROMPT) are set with `wrangler secret put`, not committed here.

[build]
command = "npm install"
cwd = "./"

[observability]
enabled = false
