name = "whykusanagi-worker"
main = "src/index.js"
compatibility_date = "2024-12-01"

# The Worker owns the apex route and reverse-proxies content from the Pages
# origin (see src/index.js). This is what serves whykusanagi.xyz without the
# apex having to be a Pages custom domain.
routes = [
  { pattern = "whykusanagi.xyz/*", zone_name = "whykusanagi.xyz" }
]

# Pages origin the Worker proxies to. Override per-deploy via the PAGES_ORIGIN
# var if the project's pages.dev subdomain ever changes.
vars = { ENVIRONMENT = "production", PAGES_ORIGIN = "https://whykusanagi.pages.dev" }

# Per-IP rate limiting for /api/chat (native Workers rate-limit binding).
# namespace_id is an arbitrary unique id for this limiter. 20 requests / 60s per IP.
[[unsafe.bindings]]
name = "CHAT_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

# Worker secrets (CELESTE_AGENT_KEY, CELESTE_AGENT_ID, CELESTE_AGENT_BASE_URL,
# CELESTE_SYSTEM_PROMPT) are set with `wrangler secret put`, not committed here.

[build]
command = "npm install"
cwd = "./"

[observability]
enabled = false
