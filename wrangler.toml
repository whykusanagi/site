name = "celeste-key-injector"
main = "src/index.js"
compatibility_date = "2024-12-01"

# Routes for the worker
routes = [
  { pattern = "whykusanagi.xyz/*", zone_name = "whykusanagi.xyz" }
]

# Per-IP rate limiting for /api/chat (native Workers rate-limit binding).
# namespace_id is an arbitrary unique id for this limiter. 20 requests / 60s per IP.
# NOTE: bindings are per-env — if you deploy with `--env production`, mirror this
# under [[env.production.unsafe.bindings]]. The default `wrangler deploy` uses this.
[[unsafe.bindings]]
name = "CHAT_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

# Environment configuration
[env.production]
routes = [
  { pattern = "whykusanagi.xyz/*", zone_name = "whykusanagi.xyz" }
]
vars = { ENVIRONMENT = "production" }

# Environment variables (set in Cloudflare dashboard)
# CELESTE_API_KEY - API key for Celeste agent authentication
# These are configured in Cloudflare Workers environment variables, not in this file

# Build configuration
[build]
command = "npm install"
cwd = "./"

# Dev configuration
[env.development]
vars = { ENVIRONMENT = "development" }
routes = [
  { pattern = "localhost:8787/*", zone_name = "localhost" }
]

# Observability
[observability]
enabled = false
