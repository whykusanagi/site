name = "celeste-key-injector"
main = "src/index.js"
compatibility_date = "2024-12-01"

# Routes for the worker
routes = [
  { pattern = "whykusanagi.xyz/*", zone_name = "whykusanagi.xyz" }
]

# Environment configuration
[env.production]
routes = [
  { pattern = "whykusanagi.xyz/*", zone_name = "whykusanagi.xyz" }
]
vars = { ENVIRONMENT = "production" }

# Environment variables (set in Cloudflare dashboard)
# CELESTE_API_KEY - API key for Celeste agent authentication
# These are configured in Cloudflare Workers environment variables, not in this file

# Build configuration
[build]
command = "npm install"
cwd = "./"

# Dev configuration
[env.development]
vars = { ENVIRONMENT = "development" }
routes = [
  { pattern = "localhost:8787/*", zone_name = "localhost" }
]

# Observability
[observability]
enabled = false
