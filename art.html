  <main class="app-shell">
    <section class="gallery-section">
      <h1 class="gallery-title">Commissioned Art Showcase</h1>

      <div class="filter-bar">
        <button data-filter="all" class="btn active">All</button>
        <button data-filter="animation" class="btn">Animation</button>
        <button data-filter="nsfw" class="btn">NSFW</button>
        <button data-filter="character" class="btn">Character</button>
      </div>

      <div class="gallery-container" id="gallery"></div>
    </section>

    <div class="lightbox" id="lightbox">
      <img src="" alt="Preview" />
    </div>

    <footer>
      &copy; 2026 whykusanagi. All rights reserved. | <strong style="color: var(--accent);">18+ Only</strong><br>
      <a href="index.html">Home</a> | <a href="privacy.html">Privacy</a> | <a href="terms.html">Terms</a> | <a href="dmca.html">DMCA</a> | <a href="refunds.html">Refunds</a> | <a href="shipping.html">Shipping</a>
    </footer>
  </main>

  <script>
    const galleryContainer = document.getElementById("gallery");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = lightbox.querySelector("img");

    async function loadGallery() {
      // Use JSONAssetLoader to automatically convert S3 URLs in the data
      const data = await window.JSONAssetLoader.fetch("art.json");

      data.forEach(item => {
        const div = document.createElement("div");
        div.className = "gallery-item";
        div.setAttribute("data-tags", item.tags.join(" "));

        const img = document.createElement("img");
        img.src = item.src;
        img.alt = item.caption;

        // Mark NSFW images for NsfwReveal (site-bootstrap.js wires the component)
        if (item.tags.includes("nsfw")) {
          img.dataset.nsfwReveal = "";
        }

        // Open lightbox on image click (NsfwReveal overlay intercepts first click when locked)
        img.addEventListener("click", () => {
          lightboxImg.src = item.src;
          lightbox.classList.add("active");
        });

        const caption = document.createElement("div");
        caption.className = "gallery-caption";
        caption.textContent = item.caption;

        div.appendChild(img);
        div.appendChild(caption);
        galleryContainer.appendChild(div);
      });

      // Signal site-bootstrap.js that the gallery is ready for NsfwReveal
      document.dispatchEvent(new CustomEvent("gallery:loaded"));
    }

    loadGallery();

    document.querySelectorAll(".filter-bar .btn").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelector(".filter-bar .btn.active")?.classList.remove("active");
        button.classList.add("active");
        const filter = button.getAttribute("data-filter");

        document.querySelectorAll(".gallery-item").forEach(item => {
          const tags = item.getAttribute("data-tags").split(" ");
          item.style.display = filter === "all" || tags.includes(filter) ? "block" : "none";
        });
      });
    });

    lightbox.addEventListener("click", () => {
      lightbox.classList.remove("active");
      lightboxImg.src = "";
    });
  </script>

  <script src="src/lib/celeste-widget.js"></script>
</body>
</html>
